"""
Pixi Features Configuration for Astrodynamics Projects
This file defines reusable feature groups for pixi.toml generation
"""

[feature.orbital-core]
description = "Core orbital mechanics - fundamental astrodynamics"
dependencies = {poliastro = "*", astropy = "*", numpy = "*", scipy = "*"}
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[feature.ephemeris-stack]
description = "Ephemeris and positional calculations"
dependencies = {spiceypy = "*", skyfield = "*", astropy = "*", numpy = "*"}
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[feature.optimization-stack]
description = "Trajectory optimization and mission design"
dependencies = {pykep = "*", pygmo = "*", poliastro = "*", numpy = "*", scipy = "*"}
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

